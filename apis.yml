name: Amazon EFS
description: Amazon Elastic File System (EFS) provides a simple, serverless, set-and-forget elastic file system for use with AWS cloud services and on-premises resources. EFS is built to scale on 
  demand to petabytes without disrupting applications, growing and shrinking automatically as you add and remove files.
