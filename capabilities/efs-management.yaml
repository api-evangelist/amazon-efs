naftiko: 1.0.0-alpha2
info:
  label: Amazon EFS Elastic File System Management
  description: Unified capability for managing EFS file systems, mount targets, and access points for storage administrators.
  tags:
  - Amazon EFS
  - AWS
  - Storage
  - File System
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: efs
    baseUri: https://elasticfilesystem.us-east-1.amazonaws.com
    description: Amazon EFS serverless elastic file system.
    authentication:
      type: apikey
      key: Authorization
      value: AWS4-HMAC-SHA256 Credential={{env.AWS_ACCESS_KEY_ID}}
      placement: header
    resources:
    - name: 2015-02-01
      path: /2015-02-01/file-systems
      description: Operations for 2015-02-01 resources.
      operations:
      - name: describeFileSystems
        method: GET
        description: Amazon EFS Describe File Systems
        inputParameters:
        - name: CreationToken
          in: query
          type: string
          required: false
          description: Restricts the list to the file system with this creation token.
        - name: FileSystemId
          in: query
          type: string
          required: false
          description: The ID of the file system to describe.
        - name: MaxItems
          in: query
          type: integer
          required: false
          description: The maximum number of file systems to return.
        - name: Marker
          in: query
          type: string
          required: false
          description: An opaque pagination token returned from a previous request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createFileSystem
        method: POST
        description: Amazon EFS Create File System
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: 2015-02-01
      path: /2015-02-01/file-systems/{FileSystemId}
      description: Operations for 2015-02-01 resources.
      operations:
      - name: deleteFileSystem
        method: DELETE
        description: Amazon EFS Delete File System
        inputParameters:
        - name: FileSystemId
          in: path
          type: string
          required: true
          description: The ID of the file system to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: 2015-02-01
      path: /2015-02-01/mount-targets
      description: Operations for 2015-02-01 resources.
      operations:
      - name: describeMountTargets
        method: GET
        description: Amazon EFS Describe Mount Targets
        inputParameters:
        - name: FileSystemId
          in: query
          type: string
          required: false
          description: The ID of the file system whose mount targets to list.
        - name: MountTargetId
          in: query
          type: string
          required: false
          description: The ID of the mount target to describe.
        - name: MaxItems
          in: query
          type: integer
          required: false
          description: The maximum number of mount targets to return.
        - name: Marker
          in: query
          type: string
          required: false
          description: An opaque pagination token returned from a previous request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createMountTarget
        method: POST
        description: Amazon EFS Create Mount Target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8085
    namespace: efs-api
    description: Unified REST API for Elastic File System Management.
    resources:
    - path: /v1/2015-02-01/file-systems
      name: describeFileSystems
      description: Amazon EFS Describe File Systems
      operations:
      - method: GET
        name: describeFileSystems
        description: Amazon EFS Describe File Systems
        call: efs.describeFileSystems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2015-02-01/file-systems
      name: createFileSystem
      description: Amazon EFS Create File System
      operations:
      - method: POST
        name: createFileSystem
        description: Amazon EFS Create File System
        call: efs.createFileSystem
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2015-02-01/file-systems
      name: deleteFileSystem
      description: Amazon EFS Delete File System
      operations:
      - method: DELETE
        name: deleteFileSystem
        description: Amazon EFS Delete File System
        call: efs.deleteFileSystem
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2015-02-01/mount-targets
      name: describeMountTargets
      description: Amazon EFS Describe Mount Targets
      operations:
      - method: GET
        name: describeMountTargets
        description: Amazon EFS Describe Mount Targets
        call: efs.describeMountTargets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2015-02-01/mount-targets
      name: createMountTarget
      description: Amazon EFS Create Mount Target
      operations:
      - method: POST
        name: createMountTarget
        description: Amazon EFS Create Mount Target
        call: efs.createMountTarget
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9095
    namespace: efs-mcp
    transport: http
    description: MCP server for AI-assisted Elastic File System Management.
    tools:
    - name: describe-file-systems
      description: Amazon EFS Describe File Systems
      hints:
        readOnly: true
        destructive: false
      call: efs.describeFileSystems
      outputParameters:
      - type: object
        mapping: $.
    - name: create-file-system
      description: Amazon EFS Create File System
      hints:
        readOnly: false
        destructive: false
      call: efs.createFileSystem
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-file-system
      description: Amazon EFS Delete File System
      hints:
        readOnly: false
        destructive: true
      call: efs.deleteFileSystem
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-mount-targets
      description: Amazon EFS Describe Mount Targets
      hints:
        readOnly: true
        destructive: false
      call: efs.describeMountTargets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-mount-target
      description: Amazon EFS Create Mount Target
      hints:
        readOnly: false
        destructive: false
      call: efs.createMountTarget
      outputParameters:
      - type: object
        mapping: $.
